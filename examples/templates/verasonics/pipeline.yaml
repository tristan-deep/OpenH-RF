# Beamforming config for the Verasonics CIRS plane-wave phantom example.
#
# The acquisition uses plane-wave compounding with an L7-4 linear array.
# RF data is demodulated before beamforming.

parameters:
  grid_size_x: 580
  grid_size_z: 600
  dynamic_range: [-40, 0]
  zlims: [0.0065, 0.058]
  # Lens correction is applied manually in reconstruct.py using the Verasonics
  # scalar one-way delay stored in the file's custom elements (see CustomElement
  # "lens_correction"). zea's Fermat-based correction is therefore disabled here.
  apply_lens_correction: false

pipeline:
  operations:
    - name: keras.ops.cast
      params:
        dtype: float32
    - name: demodulate
    - name: beamform
      params:
        beamformer: delay_and_sum
        num_patches: 200
    - name: envelope_detect
    - name: normalize
    - name: log_compress
